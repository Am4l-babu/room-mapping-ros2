slam_toolbox:
  ros__parameters:
    use_sim_time: false
    
    # General parameters
    base_frame: base_footprint
    odom_frame: odom
    map_frame: map
    
    # Sensor parameters
    scan_topic: /scan
    
    # Algorithm parameters
    # Use non-maximum suppression
    use_nms: false
    
    # SOLVER parameters
    # These are for Ceres
    ceres_linear_solver: "SPARSE_NORMAL_CHOLESKY"
    
    # Optimization parameters
    enable_interactive_mode: false
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 5.0
    
    # Minimum travel for scan matcher
    minimum_travel_distance: 0.5
    minimum_travel_heading: 0.5
    
    # Loop closure parameters
    loop_search_max_linear_search: 3.0
    loop_search_max_angular_search: 0.9
    loop_search_max_linear_radius: 4.0
    loop_search_max_angular_radius: 0.9
    do_loop_closing: true
    enable_loop_closure: true
    
    # Correlation options
    correlation_search_space_dimension: 0.15
    correlation_search_space_resolution: 0.05
    correlation_search_space_smear_deviation: 0.1
    
    # These are for correlative scan matching
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03
    
    # Scan matcher parameters
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
