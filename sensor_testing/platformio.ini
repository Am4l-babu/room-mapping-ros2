[env:micro_ros_wifi]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
src_filter = +<main_micro_ros.cpp> +<motors_encoders.cpp>
lib_deps =
  ; Core sensors
  pololu/VL53L0X@^1.3.1
  ESP32Servo@0.13.0
  adafruit/Adafruit MPU6050@^2.2.9
  adafruit/Adafruit Unified Sensor@^1.1.15
  ; micro-ROS (requires special build via micro_ros_setup)
  ; https://github.com/micro-ROS/micro_ros_arduino
  ; Follow: https://docs.ros.org/en/humble/Tutorials/Advanced/Micro-ROS/Understanding-micro-ROS.html
build_flags =
  -DARDUINO_ARCH_ESP32
  -With_support_cpp_api=true
extra_scripts =
  ; micro_ros_setup generates build configuration
  ; Uncomment after running: ros2 run micro_ros_setup configure_toolchain esp32 --dev-mode

