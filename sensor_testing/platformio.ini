[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
src_filter = +<main.cpp>
lib_deps =
  pololu/VL53L0X@^1.3.1
  ESP32Servo@0.13.0
  adafruit/Adafruit MPU6050@^2.2.9

; Uncomment and set upload_port if pio can't auto-detect your serial port:
; upload_port = /dev/ttyUSB0

[env:mpu_test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
src_filter = +<mpu_test.cpp>
lib_deps =
  adafruit/Adafruit MPU6050@^2.2.9
  adafruit/Adafruit Unified Sensor@^1.1.15

